document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

3); margin-top:2px\"><b style=\"color:var(--ink2)\">Gatilho:<\u002Fb> {{ fc.actTrigger }}<\u002Fdiv>\n                <div style=\"font-size:12px; color:var(--ink2); line-height:1.45; margin-top:2px\">{{ fc.actDesc }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:8px; margin-top:11px; padding-top:10px; border-top:1px solid var(--line)\">\n              <span style=\"font-family:'Oswald'; font-size:10px; letter-spacing:1.5px; color:var(--ink3); text-transform:uppercase\">Dificuldade<\u002Fspan>\n              <span style=\"letter-spacing:2px; color:var(--gold); font-size:13px\">{{ fc.diff }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- lista de cartas (Duel Links) -->\n          <div style=\"border-radius:12px; border:1px solid var(--line2); background:var(--panel); overflow:hidden\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-bottom:1px solid var(--line); background:linear-gradient(180deg, {{ fc.chipBg }}, transparent)\">\n              <div style=\"display:flex; align-items:center; gap:8px\"><svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"{{ fc.vibeColor }}\" stroke-width=\"1.8\"><path d=\"M3 7l9-4 9 4-9 4-9-4zM3 12l9 4 9-4M3 17l9 4 9-4\"><\u002Fpath><\u002Fsvg><span style=\"font-family:'Oswald'; font-size:14px; font-weight:600; letter-spacing:.5px\">Deck<\u002Fspan><\u002Fdiv>\n              <span style=\"font-family:'JetBrains Mono'; font-size:14px; font-weight:700; color:var(--gold)\">{{ fc.deckCount }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:10px; display:grid; grid-template-columns:repeat(6,1fr); gap:6px\">\n              <sc-for list=\"{{ deckCards }}\" as=\"d\" hint-placeholder-count=\"18\">\n                <div sc-camel-on-mouse-enter=\"{{ d.onEnter }}\" style=\"aspect-ratio:.7; border-radius:5px; overflow:hidden; position:relative; cursor:pointer; border:{{ d.border }}; background:{{ d.art }}\">\n                  <div style=\"position:absolute; inset:0; display:grid; place-items:center; font-family:'Cinzel'; font-weight:700; font-size:15px; color:rgba(255,255,255,.18)\">{{ d.mono }}<\u002Fdiv>\n                  <span style=\"position:absolute; top:2px; left:2px; width:7px; height:7px; border-radius:50%; background:{{ d.vibeColor }}; box-shadow:0 0 0 1px rgba(0,0,0,.4)\"><\u002Fspan>\n                  <span style=\"display:{{ d.qtyShow }}; position:absolute; bottom:1px; right:2px; font-family:'JetBrains Mono'; font-size:8px; font-weight:700; color:#fff; text-shadow:0 1px 2px #000\">×{{ d.qty }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <!-- painel de descrição da carta -->\n            <div style=\"padding:10px 12px; border-top:1px solid var(--line); min-height:64px; background:#0e0b1d\">\n              <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:4px\">\n                <span style=\"width:9px; height:9px; border-radius:50%; background:{{ hov.vibeColor }}\"><\u002Fspan>\n                <span style=\"font-family:'Oswald'; font-size:13px; font-weight:600\">{{ hov.name }}<\u002Fspan>\n                <span style=\"font-family:'Oswald'; font-size:9px; padding:1px 6px; border-radius:4px; font-weight:600; background:{{ hov.sealBg }}; color:{{ hov.sealFg }}\">{{ hov.seal }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:12px; color:var(--ink2); line-height:1.45\">{{ hov.eff }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- placeholder P2 (arquitetura futura) -->\n    <div style=\"display:{{ p2Show }}; position:absolute; left:50%; bottom:82px; transform:translateX(-50%); z-index:12; font-size:10px; letter-spacing:2px; color:var(--ink3); text-transform:uppercase; opacity:.6\">estrutura pronta p/ P1 · P2 (multiplayer futuro)<\u002Fdiv>\n\n    <!-- ===== BARRA INFERIOR ===== -->\n    <div style=\"position:absolute; left:0; right:0; bottom:0; height:66px; display:flex; align-items:center; justify-content:space-between; padding:0 26px; background:linear-gradient(0deg,#0b0817,transparent); z-index:20\">\n      <button sc-camel-on-click=\"{{ onBack }}\" style=\"display:flex; align-items:center; gap:9px; padding:11px 18px; border-radius:11px; cursor:pointer; font-family:'Oswald'; font-size:13px; font-weight:600; letter-spacing:.8px; border:1px solid var(--line2); background:var(--panel2); color:var(--ink2)\">\n        <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M15 6l-6 6 6 6\"><\u002Fpath><\u002Fsvg>MENU\n      <\u002Fbutton>\n      <div style=\"font-size:11px; letter-spacing:1.5px; color:var(--ink3)\">{{ hint }}<\u002Fdiv>\n      <button sc-camel-on-click=\"{{ onConfirm }}\" style=\"display:flex; align-items:center; gap:10px; padding:12px 26px; border-radius:11px; cursor:{{ confirmCursor }}; font-family:'Oswald'; font-size:15px; font-weight:700; letter-spacing:1px; border:1px solid {{ confirmBd }}; background:{{ confirmBg }}; color:{{ confirmFg }}; opacity:{{ confirmOpacity }}; box-shadow:{{ confirmShadow }}; transition:all .2s\">\n        ENTRAR NA RUN\n        <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- ===== CONFIRMAÇÃO ===== -->\n    <sc-if value=\"{{ confirmed }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; inset:0; z-index:60; background:rgba(6,4,12,.9); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; backdrop-filter:blur(3px)\">\n        <div style=\"font-family:'Oswald'; font-size:13px; letter-spacing:3px; color:var(--ink3); text-transform:uppercase\">Comandante escolhido<\u002Fdiv>\n        <div style=\"font-family:'Cinzel'; font-weight:700; font-size:130px; line-height:1; color:{{ selColor }}; text-shadow:0 0 50px {{ selGlow }}\">{{ selMono }}<\u002Fdiv>\n        <div style=\"font-family:'Oswald'; font-weight:700; font-size:34px; letter-spacing:1px\">{{ selName }}<\u002Fdiv>\n        <div style=\"font-size:13px; color:{{ selColor }}; letter-spacing:2px; text-transform:uppercase; font-weight:600\">{{ selVibe }}<\u002Fdiv>\n        <button sc-camel-on-click=\"{{ onReset }}\" style=\"margin-top:16px; padding:11px 24px; border-radius:10px; cursor:pointer; font-family:'Oswald'; font-size:13px; font-weight:600; letter-spacing:.8px; border:1px solid var(--gold); background:var(--gold); color:#1c1405\">↺ ESCOLHER OUTRO<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:720}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.stageRef = React.createRef();\n\n    this.VIBES = {\n      nerdola:{ color:'#f5c542', name:'Nerdola' },\n      socialista:{ color:'#e63946', name:'Socialista' },\n      marombeiro:{ color:'#2196f3', name:'Marombeiro' },\n      rolezeiro:{ color:'#9c27b0', name:'Rolezeiro' },\n      dinheirista:{ color:'#4caf50', name:'Dinheirista' },\n    };\n    this.SEAL = {\n      ATK:{ label:'ATK', bg:'#e63946', fg:'#fff' },\n      DEF:{ label:'DEF', bg:'#2196f3', fg:'#fff' },\n      BAL:{ label:'BAL', bg:'#4caf50', fg:'#06291f' },\n      ITEM:{ label:'ITEM', bg:'#0a0a0a', fg:'#cdbdf0' },\n    };\n    this.ART = {\n      ATK:'linear-gradient(160deg,#6a2330,#2a0e14)',\n      DEF:'linear-gradient(160deg,#1d3a5c,#0c1622)',\n      BAL:'linear-gradient(160deg,#1f4a2a,#0c1c12)',\n      ITEM:'#0a0a0a',\n    };\n\n    // ordem da grade (5 col × 2 linhas), agrupada por vibe\n    this.CMDS = [\n      { id:'fanta',    name:'Fanta',    vibe:'nerdola',     tagline:'Fusões em cadeia. Cada jogada abre a próxima.',\n        passName:'Reação em Cadeia', passDesc:'Toda fusão bem-sucedida reduz em 1 ✦ o custo da próxima fusão neste turno.',\n        actName:'Overclock', actTrigger:'3+ fusões no mesmo turno', actDesc:'Compra 2 cartas e libera uma fusão extra imediata.', diff:'★★★' },\n      { id:'nathan',   name:'Nathan',   vibe:'nerdola',     tagline:'Cada peão no campo vale ouro. Literalmente.',\n        passName:'Folha de Pagamento', passDesc:'Cada peão seu em campo gera +1 ✦ de Influência adicional por turno.',\n        actName:'Bônus', actTrigger:'4+ peões em campo', actDesc:'Converte metade da Influência guardada em cura para o Comandante.', diff:'★★☆' },\n      { id:'garopaba', name:'Garopaba', vibe:'socialista',  tagline:'Quanto mais apanha, mais perigoso fica. Cuidado.',\n        passName:'Revolta', passDesc:'A cada 200 de PV perdido, suas unidades de ATAQUE ganham +50 de ATK permanente no fight.',\n        actName:'Levante', actTrigger:'PV abaixo de 50%', actDesc:'Todas as unidades atacam imediatamente com +30% de ATK.', diff:'★★★' },\n      { id:'borba',    name:'Borba',    vibe:'socialista',  tagline:'Cada morte aliada machuca o inimigo. Quem disse que perder é ruim?',\n        passName:'Mártir', passDesc:'Toda unidade sua destruída causa 120 de dano direto à base inimiga.',\n        actName:'Comício', actTrigger:'3 aliados no cemitério', actDesc:'Ressuscita o último peão caído e dobra o dano de Mártir neste turno.', diff:'★★☆' },\n      { id:'arthur',   name:'Arthur',   vibe:'marombeiro',  tagline:'Defesa inabalável. Quanto mais no campo, mais forte.',\n        passName:'Muralha', passDesc:'Cada unidade de DEFESA em campo dá +8% de redução de dano à sua base.',\n        actName:'Formação', actTrigger:'3+ unidades de DEFESA', actDesc:'Todas as defesas recuperam 100 de PV e bloqueiam o próximo overflow.', diff:'★☆☆' },\n      { id:'vitao',    name:'Vitão',    vibe:'marombeiro',  tagline:'Ataque bruto. Sem finesse, só pancada.',\n        passName:'Marra', passDesc:'Suas unidades ignoram 20% da defesa inimiga na resolução.',\n        actName:'Supino', actTrigger:'1x por run', actDesc:'A unidade de maior ATK ataca duas vezes neste turno.', diff:'★★☆' },\n      { id:'leo',      name:'Léo',      vibe:'rolezeiro',   tagline:'Sorte e caos. Você nunca sabe o que vai sair.',\n        passName:'Zoeira', passDesc:'Ao baixar uma carta, 25% de chance de copiar seu efeito num aliado aleatório.',\n        actName:'Roleta', actTrigger:'a qualquer momento', actDesc:'Embaralha a mão e compra o mesmo número de cartas de volta.', diff:'★★★' },\n      { id:'zaga',     name:'Zaga',     vibe:'rolezeiro',   tagline:'Embaralha tudo. Seu e o do inimigo.',\n        passName:'Caos', passDesc:'No início do turno, troca de posição uma unidade sua e uma inimiga aleatórias.',\n        actName:'Reset', actTrigger:'1x por fight', actDesc:'Devolve todas as unidades não-Comandante para as mãos dos donos.', diff:'★★★' },\n      { id:'bala',     name:'Bala',     vibe:'dinheirista', tagline:'Grana gera grana. Campo cheio, Influência infinita.',\n        passName:'Juros', passDesc:'Ganha +1 ✦ para cada 2 zonas suas ocupadas ao fim do turno.',\n        actName:'Investir', actTrigger:'10+ ✦ acumulados', actDesc:'Gasta metade da Influência para comprar cartas iguais ao valor gasto.', diff:'★★☆' },\n      { id:'letti',    name:'Letti',    vibe:'dinheirista', tagline:'Mais Influência que todos. Mais cartas que todos. Simples assim.',\n        passName:'Fartura', passDesc:'Começa cada duelo com +2 ✦ e +1 carta na mão inicial.',\n        actName:'Ostentação', actTrigger:'mão cheia (9)', actDesc:'Baixa até 2 cartas sem pagar custo de Influência.', diff:'★☆☆' },\n    ];\n\n    // pools de carta por vibe p/ montar decks placeholder\n    this.POOL = {\n      nerdola:[['Streamer','DEF'],['Nerd Raiz','BAL'],['Cosplayer','ATK'],['Fanboy','BAL'],['Speedrun','ATK'],['Patch Note','ITEM'],['Setup Gamer','ITEM']],\n      socialista:[['Comunista','ATK'],['Sem Terra','ATK'],['Sindicato','DEF'],['Passeata','BAL'],['Greve','ITEM'],['Panfleto','ITEM'],['Ocupação','DEF']],\n      marombeiro:[['Bombado','DEF'],['Amante do Suco','DEF'],['Frango','BAL'],['Marombeiro','ATK'],['Whey','ITEM'],['Creatina','ITEM'],['Agachamento','BAL']],\n      rolezeiro:[['Muleque Piranha','ATK'],['Baladeiro','ATK'],['Após o Rolê','BAL'],['DJ','BAL'],['Gelada','ITEM'],['Uber','ITEM'],['After','DEF']],\n      dinheirista:[['Economista','BAL'],['Investidor','BAL'],['Corretor','ATK'],['Herdeiro','DEF'],['Dividendo','ITEM'],['Pix','ITEM'],['Cofre','DEF']],\n    };\n\n    this.state = { focus:'fanta', selected:null, confirmed:false, hoverCard:0 };\n  }\n\n  componentDidMount(){\n    let tries=0;\n    const boot=()=>{ this.fit(); if(!this.stageRef.current && tries++<20) requestAnimationFrame(boot); };\n    boot();\n    this._onResize=()=>this.fit();\n    window.addEventListener('resize', this._onResize);\n  }\n  componentWillUnmount(){ window.removeEventListener('resize', this._onResize); }\n  fit(){\n    let el=this.stageRef.current || Array.from(document.querySelectorAll('div')).find(d=>d.style.width==='1280px');\n    if(!el) return;\n    const s=Math.min(window.innerWidth/1280, window.innerHeight/720);\n    el.style.transform=`translate(-50%,-50%) scale(${s})`;\n  }\n  hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }\n\n  deckFor(id){\n    // deck placeholder determinístico por comandante\n    const c=this.CMDS.find(x=>x.id===id); const pool=this.POOL[c.vibe];\n    const cards=[];\n    // comandante como topo\n    cards.push({ name:c.name+' (CMD)', type: c.vibe==='marombeiro'?'DEF':(c.vibe==='dinheirista'?'BAL':'ATK'), vibe:c.vibe, qty:1, eff:'Comandante do deck. '+c.passName+': '+c.passDesc });\n    let seed=id.length*7+3;\n    pool.forEach((p,i)=>{ seed=(seed*9301+49297)%233280; const qty=1+(seed%3);\n      cards.push({ name:p[0], type:p[1], vibe:c.vibe, qty, eff:this.cardEff(p[0],p[1],c.vibe) }); });\n    // completa com neutros\n    const extra=[['Rodada','ITEM'],['Churrasco','ITEM'],['Brinde','DEF'],['Trapaça','ATK']];\n    extra.forEach((p,i)=>{ cards.push({ name:p[0], type:p[1], vibe:c.vibe, qty:1+((id.length+i)%2), eff:this.cardEff(p[0],p[1],c.vibe) }); });\n    return cards;\n  }\n  cardEff(name,type,vibe){\n    if(type==='ITEM') return 'Item de vibe '+this.VIBES[vibe].name+'. Efeito único jogado na fase de AÇÃO.';\n    if(type==='DEF') return 'Unidade de DEFESA — segura a linha e protege o Comandante.';\n    if(type==='ATK') return 'Unidade de ATAQUE — pressão direta na resolução.';\n    return 'Unidade de EQUILÍBRIO — versátil, boa base para fusões.';\n  }\n\n  renderVals(){\n    const S=this.state;\n    const V=(id)=>this.VIBES[id];\n    const focus=S.focus;\n    const hasFocus=!!focus;\n    const fcRaw=focus?this.CMDS.find(c=>c.id===focus):null;\n\n    const grid=this.CMDS.map((c,ci)=>{\n      const v=V(c.vibe); const isFocus=focus===c.id; const isSel=S.selected===c.id;\n      const gridCol=(ci===this.CMDS.length-1)?'2':'auto';\n      let border, bg, shadow, transform='scale(1)', anim='none';\n      if(isSel){ border=`2px solid ${v.color}`; bg=`linear-gradient(165deg, ${this.hexA(v.color,.4)}, ${this.hexA(v.color,.08)})`; shadow='none'; transform='scale(1.06)'; anim='selPulse 1.8s ease-in-out infinite'; }\n      else if(isFocus){ border=`2px solid ${v.color}`; bg=`linear-gradient(165deg, ${this.hexA(v.color,.34)}, ${this.hexA(v.color,.06)})`; shadow=`0 0 20px -2px ${this.hexA(v.color,.6)}`; transform='scale(1.05)'; }\n      else { border='1px solid var(--line2)'; bg=`linear-gradient(165deg, ${this.hexA(v.color,.13)}, rgba(10,7,18,.5))`; shadow='none'; }\n      return { name:c.name, mono:c.name[0], vibeColor:v.color, gridCol,\n        monoColor:(isFocus||isSel)?this.hexA(v.color,.55):'rgba(255,255,255,.14)',\n        border, bg, shadow, transform, anim,\n        cursorShow:isFocus?'block':'none', selShow:isSel?'flex':'none',\n        style:{'--vc':v.color,'--vg':this.hexA(v.color,.55)},\n        onEnter:()=>this.setState({focus:c.id, hoverCard:0}),\n        onClick:()=>this.setState({selected:c.id, focus:c.id}) };\n    });\n    // injeta as vars de pulso via style attr — feito no template através de border/shadow; garante var no card:\n    grid.forEach((g)=>{ g.wrap=g.style; });\n\n    let fc=null, deckCards=[], hov={vibeColor:'var(--ink3)',name:'— passe o mouse numa carta —',seal:'',sealBg:'transparent',sealFg:'var(--ink3)',eff:'A descrição da carta aparece aqui.'};\n    if(fcRaw){\n      const v=V(fcRaw.vibe);\n      const deck=this.deckFor(fcRaw.id);\n      const total=deck.reduce((s,c)=>s+c.qty,0);\n      fc={ name:fcRaw.name, mono:fcRaw.name[0], vibeColor:v.color, vibeName:v.name,\n        vibeGlow:this.hexA(v.color,.6), vibeBd:this.hexA(v.color,.4), chipBg:this.hexA(v.color,.1),\n        boxBg:`linear-gradient(160deg, ${this.hexA(v.color,.5)} 0%, #14101f 60%, #0a0712 100%)`,\n        boxSheen:`radial-gradient(120% 80% at 70% 12%, ${this.hexA(v.color,.35)}, transparent 60%)`,\n        tagline:fcRaw.tagline, deckCount:total,\n        passName:fcRaw.passName, passDesc:fcRaw.passDesc, actName:fcRaw.actName, actTrigger:fcRaw.actTrigger, actDesc:fcRaw.actDesc, diff:fcRaw.diff };\n      deckCards=deck.map((c,i)=>{ const sl=this.SEAL[c.type];\n        return { mono:c.name[0], art:this.ART[c.type], vibeColor:V(c.vibe).color,\n          border:i===0?`2px solid ${v.color}`:'1px solid rgba(255,255,255,.1)',\n          qty:c.qty, qtyShow:c.qty>1?'block':'none',\n          onEnter:()=>this.setState({hoverCard:i}) };\n      });\n      const hc=deck[Math.min(S.hoverCard, deck.length-1)]||deck[0];\n      const sl=this.SEAL[hc.type];\n      hov={ vibeColor:V(hc.vibe).color, name:hc.name, seal:sl.label, sealBg:sl.bg, sealFg:sl.fg, eff:hc.eff };\n    }\n\n    const sel=S.selected?this.CMDS.find(c=>c.id===S.selected):null;\n    const selV=sel?V(sel.vibe):null;\n    const can=!!S.selected;\n\n    return {\n      grid, hasFocus, fc, deckCards, hov,\n      focusKey: focus||'none',\n      ambientGlow: fcRaw ? `radial-gradient(90% 60% at 50% 0%, ${this.hexA(V(fcRaw.vibe).color,.16)}, transparent 70%)` : 'transparent',\n      rightPE: hasFocus?'auto':'none',\n      p2Show:'block',\n      hint: can ? 'clique em ENTRAR NA RUN pra confirmar' : 'passe o mouse pra ver o deck · clique pra selecionar',\n\n      confirmCursor: can?'pointer':'not-allowed',\n      confirmBd: can?'var(--gold)':'var(--line2)',\n      confirmBg: can?'var(--gold)':'var(--panel2)',\n      confirmFg: can?'#1c1405':'var(--ink3)',\n      confirmOpacity: can?'1':'.55',\n      confirmShadow: can?'0 0 22px -4px rgba(240,180,41,.7)':'none',\n\n      confirmed:S.confirmed,\n      selMono: sel?sel.name[0]:'', selName: sel?sel.name:'', selVibe: selV?selV.name:'',\n      selColor: selV?selV.color:'var(--gold)', selGlow: selV?this.hexA(selV.color,.6):'transparent',\n\n      onBack:()=>{},\n      onConfirm:()=>{ if(can) this.setState({confirmed:true}); },\n      onReset:()=>this.setState({confirmed:false, selected:null}),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
